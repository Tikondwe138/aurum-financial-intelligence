version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aurum_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurum_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurum_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aurum_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aurum_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurum_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aurum_user}:${POSTGRES_PASSWORD:-aurum_pass}@db:5432/${POSTGRES_DB:-aurum_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurum_celery_worker
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aurum_user}:${POSTGRES_PASSWORD:-aurum_pass}@db:5432/${POSTGRES_DB:-aurum_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aurum_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
